<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlareCloud — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FF8C00;
            --accent-light: #FFB347;
            --accent-dark: #CC7000;
            --accent-glow: rgba(255, 140, 0, 0.4);
            --gold: #FFD700;
            --bg-primary: #0A0A0F;
            --bg-card: rgba(18, 18, 28, 0.7);
            --bg-input: rgba(10, 10, 18, 0.6);
            --border: rgba(255, 255, 255, 0.06);
            --border-focus: rgba(255, 140, 0, 0.6);
            --text-primary: #F0F0F5;
            --text-secondary: #8888A0;
            --text-muted: #55556A;
            --red: #FF5252;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255, 140, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 140, 0, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0; pointer-events: none;
        }

        .bg-glow {
            position: fixed; border-radius: 50%; filter: blur(120px);
            z-index: 0; pointer-events: none; animation: float 20s infinite ease-in-out;
        }
        .bg-glow-1 { width: 600px; height: 600px; background: rgba(255, 140, 0, 0.1); top: -200px; right: -200px; }
        .bg-glow-2 { width: 500px; height: 500px; background: rgba(255, 215, 0, 0.06); bottom: -150px; left: -150px; animation-delay: -7s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(10px, 10px) scale(1.02); }
        }

        /* Login Card */
        .login-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px; padding: 0 20px;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            animation: cardIn 0.6s var(--ease);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .login-logo {
            width: 64px; height: 64px; margin: 0 auto 20px;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 12px var(--accent-glow)); }
            50% { filter: drop-shadow(0 0 24px var(--accent-glow)); }
        }

        .login-title {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 6px; letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 0.8rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 36px;
        }

        /* Key Input */
        .key-input-group {
            position: relative; margin-bottom: 24px; text-align: left;
        }

        .key-label {
            display: block; font-size: 0.72rem; font-weight: 600;
            color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px;
        }

        .key-input-wrapper {
            position: relative;
        }

        .key-input-wrapper svg {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            width: 18px; height: 18px; color: var(--text-muted);
            transition: color 0.3s;
        }

        .key-input {
            width: 100%; padding: 14px 14px 14px 42px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.25s var(--ease);
            outline: none;
        }

        .key-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
        }

        .key-input:focus + svg,
        .key-input:focus ~ svg {
            color: var(--accent);
        }

        .key-input::placeholder {
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0;
        }

        /* Error Message */
        .login-error {
            display: none;
            padding: 10px 14px;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.2);
            border-radius: 8px;
            color: var(--red);
            font-size: 0.8rem;
            margin-bottom: 20px;
            animation: shake 0.4s var(--ease);
            text-align: left;
        }

        .login-error.visible { display: block; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Submit Button */
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #000; border: none; border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s var(--ease);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px var(--accent-glow);
        }

        .login-btn:active { transform: translateY(0); }

        .login-btn:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none !important;
        }

        .login-btn .spinner {
            display: none; width: 18px; height: 18px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading .btn-text { display: none; }
        .login-btn.loading .spinner { display: inline-block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .login-footer {
            margin-top: 32px; font-size: 0.7rem;
            color: var(--text-muted); letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 64 64" fill="none" width="64" height="64">
                    <path d="M32 4L4 18V46L32 60L60 46V18L32 4Z" fill="url(#lgGrad)" opacity="0.15"/>
                    <path d="M32 4L4 18V46L32 60L60 46V18L32 4Z" stroke="url(#lgGrad)" stroke-width="2.5"/>
                    <path d="M22 32C22 26.48 26.48 22 32 22C37.52 22 42 26.48 42 32C42 37.52 37.52 42 32 42" stroke="url(#lgGrad)" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="32" cy="32" r="5" fill="url(#lgGrad)"/>
                    <defs>
                        <linearGradient id="lgGrad" x1="4" y1="4" x2="60" y2="60">
                            <stop stop-color="#FF8C00"/>
                            <stop offset="1" stop-color="#FFD700"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="login-title">FlareCloud</h1>
            <p class="login-subtitle">Enter License Key</p>

            <div class="login-error" id="login-error"></div>

            <form id="login-form" autocomplete="off">
                <div class="key-input-group">
                    <label class="key-label" for="license-key">License Key</label>
                    <div class="key-input-wrapper">
                        <input type="text" id="license-key" class="key-input"
                               placeholder="KEY-XXXX-XXXXXXX" spellcheck="false" autofocus>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);">
                            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                        </svg>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span class="btn-text">Authenticate</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <p class="login-footer">FlareCloud &middot; Made with ❤️</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const keyInput = document.getElementById('license-key');
        const btn = document.getElementById('login-btn');
        const errorEl = document.getElementById('login-error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const key = keyInput.value.trim();
            if (!key) return;

            btn.classList.add('loading');
            btn.disabled = true;
            errorEl.classList.remove('visible');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key }),
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Invalid key';
                    errorEl.classList.add('visible');
                    keyInput.select();
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Try again.';
                errorEl.classList.add('visible');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
