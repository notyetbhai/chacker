<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YetCloud — Cyberpunk Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --bg-card: rgba(13, 20, 30, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d2ff;
            --neon-cyan: #00f2fe;
            --neon-purple: #9d50bb;
            --neon-red: #ff0055;
            --text-main: #e0e6ed;
            --text-dim: #8892b0;
            --radius: 12px;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(157, 80, 187, 0.08) 0%, transparent 40%);
        }

        .login-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px; padding: 0 20px;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 210, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
        }

        .login-logo {
            width: 70px; height: 70px; margin: 0 auto 25px;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.3));
        }

        .login-title {
            font-size: 2rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-blue), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 0.75rem; color: var(--neon-red);
            text-transform: uppercase; letter-spacing: 3px;
            font-weight: 700; margin-bottom: 40px;
        }

        .input-group {
            text-align: left; margin-bottom: 25px;
        }

        .input-label {
            display: block; font-size: 0.7rem; font-weight: 700;
            color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            width: 18px; height: 18px; color: var(--text-dim);
            transition: color 0.3s;
        }

        .login-input {
            width: 100%; padding: 14px 14px 14px 44px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .login-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }

        .login-input:focus + svg {
            color: var(--neon-blue);
        }

        .error-msg {
            display: none; padding: 12px; margin-bottom: 20px;
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            border-radius: 8px; color: var(--neon-red);
            font-size: 0.8rem; font-weight: 600; text-align: left;
        }

        .error-msg.visible { display: block; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--neon-blue), #0072ff);
            color: #fff; border: none; border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.3);
            filter: brightness(1.1);
        }

        .login-btn:disabled {
            opacity: 0.5; cursor: not-allowed;
        }

        .footer-text {
            margin-top: 35px; font-size: 0.65rem;
            color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 2px;
        }

        .spinner {
            display: none; width: 18px; height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .btn-text { display: none; }
        .loading .spinner { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#lgGrad)" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="url(#lgGrad)" fill-opacity="0.1"/>
                    <defs>
                        <linearGradient id="lgGrad" x1="0" y1="0" x2="24" y2="24">
                            <stop offset="0" stop-color="#00d2ff"/>
                            <stop offset="1" stop-color="#9d50bb"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="login-title">YETCLOUD</h1>
            <p class="login-subtitle">Premium Access</p>

            <div class="error-msg" id="login-error"></div>

            <form id="login-form">
                <div class="input-group">
                    <label class="input-label" for="license-key">License Key</label>
                    <div class="input-wrapper">
                        <input type="text" id="license-key" class="login-input" 
                               placeholder="KEY-XXXXXX-XXXXXX" spellcheck="false" autofocus autocomplete="off">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                        </svg>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span class="btn-text">Authenticate</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <p class="footer-text">Security Guaranteed &middot; 2026</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const keyInput = document.getElementById('license-key');
        const btn = document.getElementById('login-btn');
        const errorEl = document.getElementById('login-error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const key = keyInput.value.trim();
            if (!key) return;

            btn.classList.add('loading');
            btn.disabled = true;
            errorEl.classList.remove('visible');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key }),
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Invalid Access Key';
                    errorEl.classList.add('visible');
                    keyInput.select();
                }
            } catch (err) {
                errorEl.textContent = 'Connection Error';
                errorEl.classList.add('visible');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
