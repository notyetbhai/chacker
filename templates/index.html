<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YetCloud — Cyberpunk Dashboard</title>
    <meta name="description" content="YetCloud Premium Checker Dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="app-title">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00d2ff" stroke-width="2.5">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
                <div>
                    <h1>YETCLOUD</h1>
                    <span class="app-subtitle">PREMIUM CHECKER</span>
                </div>
            </div>
            <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                {% if is_admin %}
                <a href="/admin" class="btn-social" style="border-color: var(--neon-purple); color: var(--neon-purple);">
                    ADMIN PANEL
                </a>
                {% endif %}
                <div class="status-badge" id="status-badge">
                    <span class="status-text" style="color: var(--text-dim); font-size: 0.7rem; font-weight: 700; text-transform: uppercase;">IDLE</span>
                </div>
            </div>
        </header>

        <!-- Configuration (Hidden initially or collapsible in logic) -->
        <div id="config-grid" style="margin-bottom: 20px;">
            <div class="action-bar" style="background: rgba(0,0,0,0.5); border: 1px solid var(--border); flex-wrap: wrap;">
                <input type="url" id="webhook-url" placeholder="Main Webhook URL" style="flex: 1; min-width: 200px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 8px 12px; color: #fff; border-radius: 4px; font-size: 0.8rem; outline: none;">
                <input type="url" id="banned-webhook" placeholder="Banned Webhook URL" style="flex: 1; min-width: 200px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 8px 12px; color: #fff; border-radius: 4px; font-size: 0.8rem; outline: none;">
                <input type="url" id="unbanned-webhook" placeholder="Unbanned Webhook URL" style="flex: 1; min-width: 200px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 8px 12px; color: #fff; border-radius: 4px; font-size: 0.8rem; outline: none;">
                <input type="number" id="thread-count" value="10" min="1" max="200" style="width: 80px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 8px; color: var(--neon-cyan); text-align: center; border-radius: 4px; outline: none;">
                <select id="proxy-type" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 4px; outline: none;">
                    <option value="4">Proxyless</option>
                    <option value="1">HTTP/s</option>
                    <option value="2">SOCKS4</option>
                    <option value="3">SOCKS5</option>
                </select>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <button class="btn-action btn-combo" id="combo-dropzone">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>
                Load Combos
                <input type="file" id="combo-file" hidden>
            </button>
            <button class="btn-action btn-proxy" id="proxy-dropzone">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Load Proxies
                <input type="file" id="proxy-file" hidden>
            </button>
            
            <div style="flex: 1;"></div>

            <button class="btn-action btn-start" id="btn-start">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
                Start
            </button>
            <button class="btn-action btn-stop" id="btn-stop" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
                Stop
            </button>
        </div>

        <!-- Info Bar (File names) -->
        <div style="display: flex; gap: 20px; margin-bottom: 20px; font-size: 0.7rem; color: var(--text-dim); padding-left: 10px;">
            <span id="combo-info">Combos: 0</span>
            <span id="proxy-info">Proxies: 0</span>
        </div>

        <!-- Hero Stats -->
        <div class="stats-grid">
            <div class="stat-card card-checked">
                <span class="stat-label">Checked</span>
                <div class="stat-value" id="progress-text">0</div>
            </div>
            <div class="stat-card card-valid">
                <span class="stat-label">Valid</span>
                <div class="stat-value" id="stat-hits">0</div>
            </div>
            <div class="stat-card card-invalid">
                <span class="stat-label">Invalid</span>
                <div class="stat-value" id="stat-bads">0</div>
            </div>
            <div class="stat-card card-2fa">
                <span class="stat-label">MFA / 2FA</span>
                <div class="stat-value" id="stat-mfa">0</div>
            </div>
            <div class="stat-card card-errors">
                <span class="stat-label">Errors</span>
                <div class="stat-value" id="errors-value">0</div>
            </div>
        </div>

        <!-- Detailed Stats -->
        <div class="stats-grid" style="grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 30px;">
            <div class="stat-card" style="padding: 12px; background: rgba(255,255,255,0.02);">
                <span class="stat-label" style="font-size: 0.55rem;">SFA</span>
                <div class="stat-value" id="stat-sfa" style="font-size: 1rem;">0</div>
            </div>
            <div class="stat-card" style="padding: 12px; background: rgba(255,255,255,0.02);">
                <span class="stat-label" style="font-size: 0.55rem;">cBP</span>
                <div class="stat-value" id="stat-twofa" style="font-size: 1rem;">0</div>
            </div>
            <div class="stat-card" style="padding: 12px; background: rgba(255,255,255,0.02);">
                <span class="stat-label" style="font-size: 0.55rem;">XGPS</span>
                <div class="stat-value" id="stat-xgp" style="font-size: 1rem;">0</div>
            </div>
            <div class="stat-card" style="padding: 12px; background: rgba(255,255,255,0.02);">
                <span class="stat-label" style="font-size: 0.55rem;">XGPS+</span>
                <div class="stat-value" id="stat-xgpu" style="font-size: 1rem;">0</div>
            </div>
            <div class="stat-card" style="padding: 12px; background: rgba(255,255,255,0.02);">
                <span class="stat-label" style="font-size: 0.55rem;">Other</span>
                <div class="stat-value" id="stat-other" style="font-size: 1rem;">0</div>
            </div>
            <div class="stat-card" style="padding: 12px; background: rgba(255,255,255,0.02);">
                <span class="stat-label" style="font-size: 0.55rem;">Valid Mail</span>
                <div class="stat-value" id="stat-valid" style="font-size: 1rem;">0</div>
            </div>
            <div class="stat-card" style="padding: 12px; background: rgba(255,255,255,0.02);">
                <span class="stat-label" style="font-size: 0.55rem;">CPM</span>
                <div class="stat-value" id="cpm-value" style="font-size: 1rem; color: var(--neon-purple);">0</div>
            </div>
        </div>

        <!-- Split View (Chart + Log) -->
        <div class="split-view">
            <!-- Graph Panel -->
            <div class="view-panel">
                <div class="panel-header">
                    <h3>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                        Live Checking Graph
                    </h3>
                </div>
                <div class="panel-content">
                    <canvas id="checkingChart"></canvas>
                </div>
            </div>

            <!-- Log Panel -->
            <div class="view-panel">
                <div class="panel-header">
                    <h3>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
                        </svg>
                        Live Log
                    </h3>
                    <div style="display: flex; gap: 10px;">
                         <span id="log-count" style="font-size: 0.6rem; color: var(--text-dim);">0 Lines</span>
                         <button id="btn-clear-log" style="background: none; border: none; color: var(--neon-red); cursor: pointer; font-size: 0.6rem; font-weight: 700;">CLEAR</button>
                    </div>
                </div>
                <div class="panel-content terminal-container" id="preview-terminal">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="social-links">
                <a href="#" class="btn-social discord-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4a19.7 19.7 0 00-4.9-1.5.1.1 0 00-.1 0 13.7 13.7 0 00-.6 1.2c-2.1-.3-4.2-.3-6.2 0a14.1 14.1 0 00-.7-1.2h-.1a19.7 19.7 0 00-4.8 1.5.1.1 0 00-.1 0C.2 8.7-.3 13 0 17.1v.1a20 20 0 006 3h.1l1.2-1.6h-.1a13 13 0 01-1.9-1c.1 0 .2-.1.3-.1 3.9 1.8 8.1 1.8 12 0 .1 0 .2.1.3.1a13 13 0 01-1.9 1h-.1L17 20.1l.2.1a20 20 0 006-3.1v-.1c.4-5-.6-9.1-2.9-12.7z"/></svg>
                    Discord
                </a>
                <a href="#" class="btn-social github-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12c0 5.3 3.4 9.8 8.2 11.4.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.2 1.9 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2.9-.3 2-.4 3-.4s2.1.1 3 .4c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2V21.4c0 .3.2.7.8.6A12 12 0 0024 12c0-6.6-5.4-12-12-12z"/></svg>
                    GitHub
                </a>
                <a href="#" class="btn-social telegram-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12c0 5.3 3.4 9.8 8.2 11.4.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.2 1.9 1.2 1.1 1.8 2.8 1.3 3.5 1.0.1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2.9-.3 2-.4 3-.4s2.1.1 3 .4c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v2.2c0 .3.2.7.8.6A12 12 0 0024 12c0-6.6-5.4-12-12-12z"/></svg>
                    Telegram
                </a>
            </div>
            
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="btn-action btn-combo" style="padding: 5px 15px; font-size: 0.6rem;" id="btn-download" disabled>Download ZIP</button>
                <div class="copyright">YetCloud © 2026 • Premium Suite</div>
                <form action="/logout" method="POST" style="display:inline;">
                    <button type="submit" style="background: none; border: none; color: var(--neon-red); font-size: 0.6rem; font-weight: 700; cursor: pointer; text-transform: uppercase;">Logout</button>
                </form>
            </div>
        </footer>
    </div>

    <!-- Hidden legacy elements -->
    <div id="progress-section" style="display:none;"><div id="progress-fill"></div></div>
    <input type="checkbox" id="auto-scroll" checked hidden>
    <div id="retries-value" hidden></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
